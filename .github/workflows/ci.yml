name: CI

# Lint + build on every PR and on pushes to main.
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. new push to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Clean, reproducible install from the lockfile. Also compiles the
      # better-sqlite3 native module.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # `next build` only compiles — it doesn't launch Chromium or touch the DB
      # (getDb() is lazy, scraping runs at request time), so no Playwright
      # browser download or env vars are needed here.
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
